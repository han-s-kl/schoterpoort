backend:
  name: github
  repo: han-s-kl/schoterpoort
  branch: main

media_folder: public/images
public_folder: /images

collections:
  # --- Editor-accessible collections ---

  - name: blocks
    label: "Mededelingen"
    label_singular: "Mededeling"
    folder: src/content/blocks
    create: true
    delete: false
    slug: "{{slug}}"
    sortable_fields: [order, title]
    fields:
      - { label: Titel, name: title, widget: string }
      - label: Type
        name: type
        widget: select
        options:
          - { label: "Waarschuwing (geel)", value: warning }
          - { label: "Informatie (blauw)", value: info }
          - { label: "Neutraal (grijs)", value: neutral }
      - { label: Zichtbaar, name: visible, widget: boolean, default: true }
      - { label: Volgorde, name: order, widget: number, default: 0, value_type: int }
      - { label: Inhoud, name: body, widget: markdown, editor_components: [], buttons: [bold, italic, link, heading-two, heading-three, quote, bulleted-list, numbered-list] }

  - name: news
    label: "Nieuwsberichten"
    label_singular: "Nieuwsbericht"
    folder: src/content/news
    create: true
    delete: false
    slug: "{{slug}}"
    sortable_fields: [date, title]
    fields:
      - { label: Titel, name: title, widget: string }
      - { label: Datum, name: date, widget: datetime, format: "YYYY-MM-DD", date_format: "DD-MM-YYYY", time_format: false }
      - { label: Beschrijving, name: description, widget: string }
      - { label: Inhoud, name: body, widget: markdown, editor_components: [], buttons: [bold, italic, link, heading-two, heading-three, quote, bulleted-list, numbered-list] }

  - name: pages
    label: "Pagina's"
    label_singular: "Pagina"
    folder: src/content/pages
    create: false
    delete: false
    slug: "{{slug}}"
    fields:
      - { label: Titel, name: title, widget: string }
      - { label: Beschrijving, name: description, widget: string }
      - { label: Inhoud, name: body, widget: markdown, editor_components: [], buttons: [bold, italic, link, heading-two, heading-three, quote, bulleted-list, numbered-list] }

  # --- Admin-only collections ---
  # These will be filtered out for editors via the PHP proxy (cms-config.php)

  - name: staff
    label: "Medewerkers"
    description: "Alleen admin -- medewerkergegevens beheren"
    files:
      - name: staff-data
        label: "Medewerkers"
        file: src/data/staff.json
        fields:
          - label: Medewerkers
            name: items
            widget: list
            fields:
              - { label: Naam, name: name, widget: string }
              - { label: Initialen, name: initials, widget: string }
              - { label: Rol, name: role, widget: string }
              - { label: BIG-nummer, name: bigNumber, widget: string, required: false }
              - { label: Team, name: team, widget: string }
              - { label: Telefoon, name: phone, widget: string }
              - { label: Werkdagen, name: workingDays, widget: list, field: { label: Dag, name: dag, widget: string } }
              - { label: "In dienst sinds", name: since, widget: string, required: false }
              - { label: Achtergrond, name: background, widget: text }
              - { label: Specialisaties, name: specializations, widget: list, required: false, field: { label: Specialisatie, name: spec, widget: string } }
              - { label: Interesses, name: interests, widget: text, required: false }
              - { label: Foto, name: photo, widget: image, required: false }

  - name: navigation-nl
    label: "Navigatie"
    description: "Alleen admin -- menustructuur beheren"
    files:
      - name: nav-nl
        label: "Menu (NL)"
        file: src/data/navigation.json
        fields:
          - label: "Menu-items"
            name: items
            widget: list
            fields:
              - { label: Label, name: label, widget: string }
              - { label: Link, name: href, widget: string }
              - label: Submenu
                name: children
                widget: list
                required: false
                fields:
                  - { label: Label, name: label, widget: string }
                  - { label: Link, name: href, widget: string }

