<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>CMS - Huisartsenpraktijk Schoterpoort</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #e0e0e0; }
    .auth { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: #16213e; border-radius: 12px; padding: 2rem; width: 100%; max-width: 360px; box-shadow: 0 4px 16px rgba(0,0,0,0.3); }
    h1 { font-size: 1.25rem; margin-bottom: 0.5rem; color: #fff; }
    p { font-size: 0.875rem; color: #999; margin-bottom: 1.5rem; }
    label { display: block; font-size: 0.875rem; font-weight: 500; margin-bottom: 0.5rem; color: #ccc; }
    input { width: 100%; padding: 0.625rem 0.75rem; border: 1px solid #333; border-radius: 8px; font-size: 1rem; background: #0f3460; color: #fff; }
    input:focus { outline: none; border-color: #5c7cfa; }
    button { width: 100%; padding: 0.625rem; background: #5c7cfa; color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: 500; cursor: pointer; margin-top: 1rem; }
    button:hover { background: #4c6ef5; }
    button:disabled { opacity: 0.5; cursor: wait; }
    .error { color: #ff6b6b; font-size: 0.875rem; margin-top: 0.75rem; display: none; }
  </style>
</head>
<body>
  <div class="auth" id="auth">
    <div class="card">
      <h1>CMS Schoterpoort</h1>
      <p>Voer het wachtwoord in om in te loggen.</p>
      <form id="form">
        <label for="password">Wachtwoord</label>
        <input type="password" id="password" autocomplete="current-password" required autofocus />
        <button type="submit" id="btn">Inloggen</button>
        <div class="error" id="error">Onjuist wachtwoord. Probeer opnieuw.</div>
      </form>
    </div>
  </div>
  <script>
    const ENCRYPTED = 'NGJVhe4KcEE+LEe9UCi6xcx4LVSlI+Mm1KtKTxm/QOJ/KSEtlGawaLZE3hmsUEiI66pshdgM/dK+ioE6bnRISB/KnW3RUANJFgAtIUyLQGXwLUxQ1+Sg5UVZELY0DirfnkFoO8MTXejSGnYRMqadl9XnngdO5EJdSVWg10KoZ8X4AgpynAHEHJY=';

    async function decrypt(password) {
      const data = Uint8Array.from(atob(ENCRYPTED), c => c.charCodeAt(0));
      const salt = data.slice(0, 16);
      const iv = data.slice(16, 28);
      const tag = data.slice(28, 44);
      const ciphertext = data.slice(44);
      const combined = new Uint8Array(ciphertext.length + tag.length);
      combined.set(ciphertext);
      combined.set(tag, ciphertext.length);

      const keyMaterial = await crypto.subtle.importKey(
        'raw', new TextEncoder().encode(password), 'PBKDF2', false, ['deriveKey']
      );
      const key = await crypto.subtle.deriveKey(
        { name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' },
        keyMaterial,
        { name: 'AES-GCM', length: 256 },
        false,
        ['decrypt']
      );
      const decrypted = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, combined);
      return new TextDecoder().decode(decrypted);
    }

    function loadCMS(token) {
      // Store token so Sveltia CMS picks it up as already authenticated
      const user = JSON.stringify({
        backendName: 'github',
        token: token,
        name: 'Editor',
        login: 'editor',
      });
      localStorage.setItem('netlify-cms-user', user);

      // Hide login, load CMS
      document.getElementById('auth').style.display = 'none';
      const script = document.createElement('script');
      script.src = 'https://unpkg.com/decap-cms-app@latest/dist/decap-cms.js';
      document.body.appendChild(script);
    }

    // Check if already authenticated this session
    const stored = sessionStorage.getItem('cms-token');
    if (stored) {
      loadCMS(stored);
    }

    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btn');
      const errorEl = document.getElementById('error');
      errorEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Bezig...';

      try {
        const token = await decrypt(document.getElementById('password').value);
        sessionStorage.setItem('cms-token', token);
        loadCMS(token);
      } catch {
        errorEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Inloggen';
      }
    });
  </script>
</body>
</html>
