<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>CMS - Huisartsenpraktijk Schoterpoort</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.css" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      --font-mono: 'SF Mono', SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace;

      /* Auth theme */
      --auth-bg: #1a1a2e;
      --auth-card: #16213e;
      --auth-input: #0f3460;
      --auth-accent: #5c7cfa;

      /* CMS theme */
      --sidebar-bg: #1e2433;
      --sidebar-text: #a0a8b8;
      --sidebar-active: #fff;
      --sidebar-hover: #2a3142;
      --sidebar-accent: #5c7cfa;
      --main-bg: #f4f5f7;
      --editor-bg: #fff;
      --topbar-bg: #fff;
      --text: #1a1a2e;
      --text-muted: #6b7280;
      --border: #e2e4e8;
      --save-bg: #16a34a;
      --save-hover: #15803d;
      --error: #dc2626;
      --success: #16a34a;
      --radius: 6px;
    }

    body {
      font-family: var(--font);
      background: var(--auth-bg);
      color: #e0e0e0;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* --- AUTH --- */
    .auth {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .auth-card {
      background: var(--auth-card);
      border-radius: 12px;
      padding: 2rem;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    }
    .auth-card h1 {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
      color: #fff;
    }
    .auth-card .subtitle {
      font-size: 0.875rem;
      color: #8890a0;
      margin-bottom: 1.5rem;
    }
    .auth-card label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 500;
      margin-bottom: 0.375rem;
      color: #b0b8c8;
    }
    .auth-card input {
      width: 100%;
      padding: 0.625rem 0.75rem;
      border: 1px solid #2a3450;
      border-radius: var(--radius);
      font-size: 0.9375rem;
      font-family: var(--font);
      background: var(--auth-input);
      color: #fff;
      transition: border-color 0.15s;
    }
    .auth-card input:focus {
      outline: none;
      border-color: var(--auth-accent);
    }
    .auth-card button {
      width: 100%;
      padding: 0.625rem;
      background: var(--auth-accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 0.9375rem;
      font-weight: 500;
      font-family: var(--font);
      cursor: pointer;
      margin-top: 1rem;
      transition: background 0.15s;
    }
    .auth-card button:hover { background: #4c6ef5; }
    .auth-card button:disabled { opacity: 0.5; cursor: wait; }
    .auth-error {
      color: #ff6b6b;
      font-size: 0.8125rem;
      margin-top: 0.75rem;
      display: none;
    }

    /* --- CMS LAYOUT --- */
    .cms { display: none; height: 100vh; }
    .cms.active { display: flex; }

    /* Sidebar */
    .sidebar {
      width: 260px;
      min-width: 260px;
      background: var(--sidebar-bg);
      display: flex;
      flex-direction: column;
      border-right: 1px solid rgba(255,255,255,0.06);
      overflow: hidden;
    }
    .sidebar-header {
      padding: 1.25rem 1.25rem 1rem;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .sidebar-header h2 {
      font-size: 0.875rem;
      font-weight: 600;
      color: #fff;
      letter-spacing: -0.01em;
    }
    .sidebar-header .version {
      font-size: 0.6875rem;
      color: #5a6270;
      margin-top: 0.125rem;
    }
    .collections {
      padding: 0.5rem 0.75rem;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .collection-btn {
      display: block;
      width: 100%;
      text-align: left;
      padding: 0.5rem 0.625rem;
      border: none;
      background: none;
      color: var(--sidebar-text);
      font-size: 0.8125rem;
      font-family: var(--font);
      font-weight: 500;
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.1s;
    }
    .collection-btn:hover {
      background: var(--sidebar-hover);
      color: #d0d4dc;
    }
    .collection-btn.active {
      background: rgba(92, 124, 250, 0.15);
      color: var(--sidebar-active);
    }
    .collection-btn .count {
      float: right;
      font-size: 0.6875rem;
      color: #5a6270;
      font-weight: 400;
    }
    .file-list {
      flex: 1;
      overflow-y: auto;
      padding: 0.5rem 0.75rem;
    }
    .file-list::-webkit-scrollbar { width: 4px; }
    .file-list::-webkit-scrollbar-thumb { background: #3a4250; border-radius: 2px; }
    .file-item {
      display: block;
      width: 100%;
      text-align: left;
      padding: 0.5rem 0.625rem;
      border: none;
      background: none;
      color: var(--sidebar-text);
      font-size: 0.8125rem;
      font-family: var(--font);
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.1s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .file-item:hover {
      background: var(--sidebar-hover);
      color: #d0d4dc;
    }
    .file-item.active {
      background: rgba(92, 124, 250, 0.12);
      color: var(--sidebar-active);
    }
    .file-item .file-meta {
      display: block;
      font-size: 0.6875rem;
      color: #5a6270;
      font-weight: 400;
      margin-top: 0.125rem;
    }

    /* Main area */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--main-bg);
      overflow: hidden;
    }

    /* Top bar */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1.5rem;
      background: var(--topbar-bg);
      border-bottom: 1px solid var(--border);
      min-height: 56px;
    }
    .topbar-left {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      min-width: 0;
    }
    .topbar-file {
      font-size: 0.9375rem;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .topbar-collection {
      font-size: 0.75rem;
      color: var(--text-muted);
      background: var(--main-bg);
      padding: 0.125rem 0.5rem;
      border-radius: 3px;
      white-space: nowrap;
    }
    .topbar-right {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .status {
      font-size: 0.75rem;
      color: var(--text-muted);
      transition: color 0.2s;
    }
    .status.saving { color: var(--sidebar-accent); }
    .status.saved { color: var(--success); }
    .status.error { color: var(--error); }
    .save-btn {
      padding: 0.4375rem 1rem;
      background: var(--save-bg);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 0.8125rem;
      font-weight: 500;
      font-family: var(--font);
      cursor: pointer;
      transition: background 0.15s;
    }
    .save-btn:hover { background: var(--save-hover); }
    .save-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Editor area */
    .editor-area {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
    }
    .editor-panel {
      max-width: 900px;
      margin: 0 auto;
    }
    .no-selection {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-muted);
      font-size: 0.9375rem;
    }

    /* Frontmatter fields */
    .fields {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1rem;
      margin-bottom: 1.5rem;
      background: var(--editor-bg);
      padding: 1.25rem;
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }
    .field {
      display: flex;
      flex-direction: column;
    }
    .field label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.03em;
      margin-bottom: 0.375rem;
    }
    .field input, .field select {
      padding: 0.5rem 0.625rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 0.875rem;
      font-family: var(--font);
      color: var(--text);
      background: #fff;
      transition: border-color 0.15s;
    }
    .field input:focus, .field select:focus {
      outline: none;
      border-color: var(--sidebar-accent);
    }
    .field-checkbox {
      flex-direction: row;
      align-items: center;
      gap: 0.5rem;
    }
    .field-checkbox input {
      width: auto;
      accent-color: var(--sidebar-accent);
    }
    .field-checkbox label {
      margin-bottom: 0;
      text-transform: none;
      font-size: 0.875rem;
      color: var(--text);
    }

    /* Markdown editor wrapper */
    .markdown-wrap {
      background: var(--editor-bg);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
    }
    .markdown-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.03em;
      padding: 0.875rem 1.25rem 0;
    }

    /* EasyMDE overrides */
    .EasyMDEContainer { border: none !important; }
    .EasyMDEContainer .CodeMirror {
      border: none !important;
      border-top: 1px solid var(--border) !important;
      border-radius: 0 !important;
      font-family: var(--font) !important;
      font-size: 0.9375rem !important;
      min-height: 400px;
      color: var(--text) !important;
    }
    .EasyMDEContainer .editor-toolbar {
      border: none !important;
      border-top: 1px solid var(--border) !important;
      padding: 0.5rem 0.75rem !important;
      background: #fafbfc;
    }
    .EasyMDEContainer .editor-toolbar button {
      color: #6b7280 !important;
      border: none !important;
      border-radius: 4px !important;
      width: 32px !important;
      height: 32px !important;
    }
    .EasyMDEContainer .editor-toolbar button:hover {
      background: var(--main-bg) !important;
      color: var(--text) !important;
    }
    .EasyMDEContainer .editor-toolbar button.active {
      background: rgba(92, 124, 250, 0.1) !important;
      color: var(--sidebar-accent) !important;
    }
    .EasyMDEContainer .editor-toolbar i.separator {
      border-left-color: var(--border) !important;
    }
    .EasyMDEContainer .editor-preview {
      font-family: var(--font) !important;
      padding: 1.25rem !important;
    }
    .EasyMDEContainer .cm-header { color: var(--text) !important; }

    /* Loading spinner */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem;
      color: var(--text-muted);
      font-size: 0.875rem;
    }
    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--sidebar-accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 0.5rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <!-- AUTH SCREEN -->
  <div class="auth" id="auth">
    <div class="auth-card">
      <h1>CMS Schoterpoort</h1>
      <p class="subtitle">Voer het wachtwoord in om in te loggen.</p>
      <form id="auth-form">
        <label for="password">Wachtwoord</label>
        <input type="password" id="password" autocomplete="current-password" required autofocus />
        <button type="submit" id="auth-btn">Inloggen</button>
        <div class="auth-error" id="auth-error">Onjuist wachtwoord. Probeer opnieuw.</div>
      </form>
    </div>
  </div>

  <!-- CMS SCREEN -->
  <div class="cms" id="cms">
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2>Schoterpoort CMS</h2>
        <div class="version">Content beheer</div>
      </div>
      <nav class="collections" id="collections"></nav>
      <div class="file-list" id="file-list"></div>
    </aside>
    <main class="main">
      <div class="topbar" id="topbar">
        <div class="topbar-left">
          <span class="topbar-file" id="topbar-file">Selecteer een bestand</span>
          <span class="topbar-collection" id="topbar-collection"></span>
        </div>
        <div class="topbar-right">
          <span class="status" id="status"></span>
          <button class="save-btn" id="save-btn" disabled>Opslaan</button>
        </div>
      </div>
      <div class="editor-area" id="editor-area">
        <div class="no-selection" id="no-selection">Kies een collectie en bestand om te bewerken</div>
        <div class="editor-panel" id="editor-panel" style="display:none">
          <div class="fields" id="fields"></div>
          <div class="markdown-wrap">
            <div class="markdown-label">Inhoud</div>
            <textarea id="editor-textarea"></textarea>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.js"></script>
  <script>
    // --- CONFIG ---
    const REPO = 'han-s-kl/schoterpoort';
    const BRANCH = 'main';
    const API = 'https://api.github.com';
    const ENCRYPTED = 'NGJVhe4KcEE+LEe9UCi6xcx4LVSlI+Mm1KtKTxm/QOJ/KSEtlGawaLZE3hmsUEiI66pshdgM/dK+ioE6bnRISB/KnW3RUANJFgAtIUyLQGXwLUxQ1+Sg5UVZELY0DirfnkFoO8MTXejSGnYRMqadl9XnngdO5EJdSVWg10KoZ8X4AgpynAHEHJY=';

    const COLLECTIONS = [
      {
        name: 'blocks', label: 'Mededelingen',
        folder: 'src/content/blocks',
        fields: [
          { name: 'title', label: 'Titel', type: 'string' },
          { name: 'type', label: 'Type', type: 'select', options: [
            { value: 'warning', label: 'Waarschuwing (geel)' },
            { value: 'info', label: 'Informatie (blauw)' },
            { value: 'neutral', label: 'Neutraal (grijs)' },
          ]},
          { name: 'visible', label: 'Zichtbaar', type: 'boolean' },
          { name: 'order', label: 'Volgorde', type: 'number' },
        ]
      },
      {
        name: 'pages', label: "Pagina's",
        folder: 'src/content/pages',
        fields: [
          { name: 'title', label: 'Titel', type: 'string' },
          { name: 'description', label: 'Beschrijving', type: 'string' },
        ]
      }
    ];

    // --- STATE ---
    let token = null;
    let currentCollection = null;
    let currentFile = null;
    let currentSha = null;
    let fileCaches = {};
    let mde = null;

    // --- AUTH ---
    async function decrypt(password) {
      const data = Uint8Array.from(atob(ENCRYPTED), c => c.charCodeAt(0));
      const salt = data.slice(0, 16);
      const iv = data.slice(16, 28);
      const tag = data.slice(28, 44);
      const ciphertext = data.slice(44);
      const combined = new Uint8Array(ciphertext.length + tag.length);
      combined.set(ciphertext);
      combined.set(tag, ciphertext.length);
      const keyMaterial = await crypto.subtle.importKey(
        'raw', new TextEncoder().encode(password), 'PBKDF2', false, ['deriveKey']
      );
      const key = await crypto.subtle.deriveKey(
        { name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' },
        keyMaterial, { name: 'AES-GCM', length: 256 }, false, ['decrypt']
      );
      const decrypted = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, combined);
      return new TextDecoder().decode(decrypted);
    }

    // --- GITHUB API ---
    async function ghFetch(path, opts = {}) {
      const res = await fetch(`${API}/repos/${REPO}/contents/${path}?ref=${BRANCH}`, {
        headers: {
          Authorization: `Bearer ${token}`,
          Accept: 'application/vnd.github.v3+json',
          ...opts.headers,
        },
        ...opts,
      });
      if (!res.ok) throw new Error(`GitHub API ${res.status}: ${res.statusText}`);
      return res.json();
    }

    async function listFiles(folder) {
      if (fileCaches[folder]) return fileCaches[folder];
      const items = await ghFetch(folder);
      const files = items
        .filter(f => f.name.endsWith('.md'))
        .map(f => ({ name: f.name, path: f.path, sha: f.sha }));
      fileCaches[folder] = files;
      return files;
    }

    async function readFile(path) {
      const data = await ghFetch(path);
      const content = decodeURIComponent(escape(atob(data.content.replace(/\n/g, ''))));
      return { content, sha: data.sha };
    }

    async function saveFile(path, content, sha, message) {
      const encoded = btoa(unescape(encodeURIComponent(content)));
      const res = await fetch(`${API}/repos/${REPO}/contents/${path}`, {
        method: 'PUT',
        headers: {
          Authorization: `Bearer ${token}`,
          Accept: 'application/vnd.github.v3+json',
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({
          message,
          content: encoded,
          sha,
          branch: BRANCH,
        }),
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.message || `Save failed: ${res.status}`);
      }
      const data = await res.json();
      return data.content.sha;
    }

    // --- FRONTMATTER ---
    function parseFrontmatter(raw) {
      const match = raw.match(/^---\r?\n([\s\S]*?)\r?\n---\r?\n?([\s\S]*)$/);
      if (!match) return { meta: {}, body: raw };
      const meta = {};
      for (const line of match[1].split('\n')) {
        const idx = line.indexOf(':');
        if (idx === -1) continue;
        const key = line.slice(0, idx).trim();
        let val = line.slice(idx + 1).trim();
        if ((val.startsWith('"') && val.endsWith('"')) ||
            (val.startsWith("'") && val.endsWith("'"))) {
          val = val.slice(1, -1);
        }
        if (val === 'true') val = true;
        else if (val === 'false') val = false;
        else if (/^\d+$/.test(val)) val = parseInt(val, 10);
        meta[key] = val;
      }
      return { meta, body: match[2] };
    }

    function serializeFrontmatter(meta, body, fields) {
      let fm = '---\n';
      for (const field of fields) {
        const val = meta[field.name];
        if (val === undefined || val === null) continue;
        if (typeof val === 'string') {
          fm += `${field.name}: "${val}"\n`;
        } else {
          fm += `${field.name}: ${val}\n`;
        }
      }
      fm += '---\n';
      return fm + body;
    }

    // --- UI ---
    function setStatus(text, type = '') {
      const el = document.getElementById('status');
      el.textContent = text;
      el.className = 'status' + (type ? ' ' + type : '');
    }

    function renderCollections() {
      const container = document.getElementById('collections');
      container.innerHTML = '';
      for (const col of COLLECTIONS) {
        const btn = document.createElement('button');
        btn.className = 'collection-btn';
        btn.textContent = col.label;
        btn.addEventListener('click', () => selectCollection(col));
        container.appendChild(btn);
      }
    }

    async function selectCollection(col) {
      currentCollection = col;
      currentFile = null;
      currentSha = null;

      document.querySelectorAll('.collection-btn').forEach((b, i) => {
        b.classList.toggle('active', COLLECTIONS[i] === col);
      });

      const fileList = document.getElementById('file-list');
      fileList.innerHTML = '<div class="loading"><span class="spinner"></span>Laden...</div>';

      document.getElementById('editor-panel').style.display = 'none';
      document.getElementById('no-selection').style.display = 'flex';
      document.getElementById('topbar-file').textContent = 'Selecteer een bestand';
      document.getElementById('topbar-collection').textContent = col.label;
      document.getElementById('save-btn').disabled = true;

      try {
        const files = await listFiles(col.folder);
        fileList.innerHTML = '';
        for (const file of files) {
          const btn = document.createElement('button');
          btn.className = 'file-item';
          btn.textContent = file.name.replace(/\.md$/, '');
          btn.addEventListener('click', () => selectFile(col, file));
          fileList.appendChild(btn);
        }
        // Update count
        document.querySelectorAll('.collection-btn').forEach((b, i) => {
          if (COLLECTIONS[i] === col) {
            const countEl = b.querySelector('.count');
            if (countEl) countEl.textContent = files.length;
            else {
              const span = document.createElement('span');
              span.className = 'count';
              span.textContent = files.length;
              b.appendChild(span);
            }
          }
        });
      } catch (err) {
        fileList.innerHTML = `<div class="loading" style="color:var(--error)">Fout: ${err.message}</div>`;
      }
    }

    async function selectFile(col, file) {
      currentFile = file;
      setStatus('Laden...', 'saving');

      document.querySelectorAll('.file-item').forEach(b => {
        b.classList.toggle('active', b.textContent === file.name.replace(/\.md$/, ''));
      });

      document.getElementById('topbar-file').textContent = file.name.replace(/\.md$/, '');
      document.getElementById('topbar-collection').textContent = col.label;

      try {
        const { content, sha } = await readFile(file.path);
        currentSha = sha;
        const { meta, body } = parseFrontmatter(content);

        renderFields(col.fields, meta);
        renderEditor(body);

        document.getElementById('no-selection').style.display = 'none';
        document.getElementById('editor-panel').style.display = 'block';
        document.getElementById('save-btn').disabled = false;
        setStatus('');
      } catch (err) {
        setStatus(`Fout: ${err.message}`, 'error');
      }
    }

    function renderFields(fields, meta) {
      const container = document.getElementById('fields');
      container.innerHTML = '';

      for (const field of fields) {
        const div = document.createElement('div');
        div.className = field.type === 'boolean' ? 'field field-checkbox' : 'field';

        const label = document.createElement('label');
        label.textContent = field.label;
        label.htmlFor = `field-${field.name}`;

        let input;
        if (field.type === 'select') {
          input = document.createElement('select');
          for (const opt of field.options) {
            const option = document.createElement('option');
            option.value = opt.value;
            option.textContent = opt.label;
            if (meta[field.name] === opt.value) option.selected = true;
            input.appendChild(option);
          }
        } else if (field.type === 'boolean') {
          input = document.createElement('input');
          input.type = 'checkbox';
          input.checked = meta[field.name] === true;
        } else if (field.type === 'number') {
          input = document.createElement('input');
          input.type = 'number';
          input.value = meta[field.name] ?? '';
        } else if (field.type === 'date') {
          input = document.createElement('input');
          input.type = 'date';
          input.value = meta[field.name] ?? '';
        } else {
          input = document.createElement('input');
          input.type = 'text';
          input.value = meta[field.name] ?? '';
        }

        input.id = `field-${field.name}`;
        input.dataset.fieldName = field.name;
        input.dataset.fieldType = field.type;

        if (field.type === 'boolean') {
          div.appendChild(input);
          div.appendChild(label);
        } else {
          div.appendChild(label);
          div.appendChild(input);
        }
        container.appendChild(div);
      }
    }

    function renderEditor(body) {
      if (mde) {
        mde.toTextArea();
        mde = null;
      }
      document.getElementById('editor-textarea').value = body;
      mde = new EasyMDE({
        element: document.getElementById('editor-textarea'),
        spellChecker: false,
        autofocus: false,
        status: false,
        toolbar: [
          'bold', 'italic', 'heading', '|',
          'unordered-list', 'ordered-list', '|',
          'link', 'image', '|',
          'preview', 'side-by-side', '|',
          'guide'
        ],
        minHeight: '400px',
      });
    }

    function gatherContent() {
      if (!currentCollection || !mde) return null;
      const meta = {};
      for (const field of currentCollection.fields) {
        const input = document.getElementById(`field-${field.name}`);
        if (!input) continue;
        if (field.type === 'boolean') {
          meta[field.name] = input.checked;
        } else if (field.type === 'number') {
          meta[field.name] = parseInt(input.value, 10) || 0;
        } else {
          meta[field.name] = input.value;
        }
      }
      const body = mde.value();
      return serializeFrontmatter(meta, body, currentCollection.fields);
    }

    async function handleSave() {
      if (!currentFile || !currentSha) return;
      const content = gatherContent();
      if (!content) return;

      const saveBtn = document.getElementById('save-btn');
      saveBtn.disabled = true;
      setStatus('Opslaan...', 'saving');

      try {
        const fileName = currentFile.name.replace(/\.md$/, '');
        const msg = `Update ${currentCollection.label.toLowerCase()}: ${fileName}`;
        currentSha = await saveFile(currentFile.path, content, currentSha, msg);
        // Invalidate cache so next load gets fresh data
        delete fileCaches[currentCollection.folder];
        setStatus('Opgeslagen', 'saved');
        setTimeout(() => setStatus(''), 3000);
      } catch (err) {
        setStatus(`Fout: ${err.message}`, 'error');
      } finally {
        saveBtn.disabled = false;
      }
    }

    // --- INIT ---
    function initCMS(t) {
      token = t;
      document.getElementById('auth').style.display = 'none';
      document.body.style.background = 'var(--main-bg)';
      document.getElementById('cms').classList.add('active');
      renderCollections();
      document.getElementById('save-btn').addEventListener('click', handleSave);
    }

    // Check session
    const stored = sessionStorage.getItem('cms-token');
    if (stored) {
      initCMS(stored);
    }

    // Login form
    document.getElementById('auth-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('auth-btn');
      const errorEl = document.getElementById('auth-error');
      errorEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Bezig...';
      try {
        const t = await decrypt(document.getElementById('password').value);
        sessionStorage.setItem('cms-token', t);
        initCMS(t);
      } catch {
        errorEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Inloggen';
      }
    });
  </script>
</body>
</html>
